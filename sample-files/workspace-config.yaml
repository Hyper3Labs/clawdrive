# ClawDrive workspace configuration
workspace:
  name: research-workspace
  created: 2026-03-01
  owner: agent-alpha

storage:
  path: ./data
  max_size_gb: 10
  backup_interval: daily

embedding:
  model: gemini-embedding-2
  dimensions: 3072
  batch_size: 32

taxonomy:
  max_depth: 4
  max_children: 8
  auto_categorize: true
