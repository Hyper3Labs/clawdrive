<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawDrive - File Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 1rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; }
    .badge {
      background: #4361ee;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    main { padding: 2rem; text-align: center; color: #a0a0b0; }
    main p { margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>ClawDrive</h1>
    <span class="badge">100 files</span>
  </header>
  <main>
    <p>Multimodal file storage for AI agents</p>
    <p>Powered by semantic embeddings &amp; 3D visualization</p>
  </main>
</body>
</html>
