# ClawDrive API Error Codes
errors:
  - code: CLAW_001
    status: 400
    message: "Invalid file format"
    description: "The uploaded file type is not supported"

  - code: CLAW_002
    status: 413
    message: "File too large"
    description: "File exceeds the maximum upload size"

  - code: CLAW_003
    status: 404
    message: "File not found"
    description: "The requested file ID does not exist"

  - code: CLAW_004
    status: 429
    message: "Rate limit exceeded"
    description: "Too many requests, please retry later"

  - code: CLAW_005
    status: 503
    message: "Embedding service unavailable"
    description: "The embedding model is temporarily unavailable"

  - code: CLAW_006
    status: 409
    message: "Duplicate file"
    description: "A file with the same hash already exists"
