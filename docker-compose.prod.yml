services:
  clawdrive:
    image: ghcr.io/hyper3labs/hyperdrive/demo:latest
    container_name: clawdrive-demo
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clawdrive.rule=Host(`claw3drive.com`)"
      - "traefik.http.routers.clawdrive.entrypoints=websecure"
      - "traefik.http.routers.clawdrive.tls.certresolver=letsencrypt"
      - "traefik.http.services.clawdrive.loadbalancer.server.port=7860"
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  proxy:
    external: true
