<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tiered retrieval diagram</title>
  <desc id="desc">A left-to-right flow from query to pot scope to semantic search to TLDR to digest to original file or matched chunk.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="48" x2="1120" y2="312" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="queryFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE3B3"/>
      <stop offset="1" stop-color="#FFC76A"/>
    </linearGradient>
    <linearGradient id="scopeFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDF4C7"/>
      <stop offset="1" stop-color="#A7DA7B"/>
    </linearGradient>
    <linearGradient id="searchFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D7EBFF"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="tldrFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8D7FF"/>
      <stop offset="1" stop-color="#D79CF8"/>
    </linearGradient>
    <linearGradient id="digestFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD7D2"/>
      <stop offset="1" stop-color="#FF9E8F"/>
    </linearGradient>
    <linearGradient id="fileFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D7FFF2"/>
      <stop offset="1" stop-color="#81E6C5"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1240" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M2 2L12 7L2 12V2Z" fill="#38506B"/>
    </marker>
    <style>
      .label { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102033; }
      .body { font: 500 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #29435C; }
      .caption { font: 600 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #38506B; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="40" y="40" width="1120" height="280" rx="28" fill="url(#bg)"/>
  </g>

  <text x="80" y="92" class="caption">Cheap context first, full fidelity last</text>

  <rect x="78" y="132" width="152" height="92" rx="22" fill="url(#queryFill)" stroke="#D28A19" stroke-width="2"/>
  <text x="154" y="172" text-anchor="middle" class="label">Query</text>
  <text x="154" y="198" text-anchor="middle" class="body">text or media</text>

  <path d="M287 132L343 178L287 224L231 178L287 132Z" fill="url(#scopeFill)" stroke="#5C8D2F" stroke-width="2"/>
  <text x="287" y="173" text-anchor="middle" class="label">Pot</text>
  <text x="287" y="199" text-anchor="middle" class="body">scope</text>

  <rect x="398" y="132" width="174" height="92" rx="22" fill="url(#searchFill)" stroke="#3974C7" stroke-width="2"/>
  <text x="485" y="172" text-anchor="middle" class="label">Semantic</text>
  <text x="485" y="198" text-anchor="middle" class="body">search</text>

  <rect x="626" y="120" width="154" height="116" rx="22" fill="url(#tldrFill)" stroke="#A855C2" stroke-width="2"/>
  <text x="703" y="164" text-anchor="middle" class="label">TLDR</text>
  <text x="703" y="191" text-anchor="middle" class="body">fast shortlist</text>

  <rect x="834" y="120" width="170" height="116" rx="22" fill="url(#digestFill)" stroke="#D35A49" stroke-width="2"/>
  <text x="919" y="164" text-anchor="middle" class="label">Digest</text>
  <text x="919" y="191" text-anchor="middle" class="body">richer markdown</text>
  <text x="919" y="213" text-anchor="middle" class="body">context</text>

  <rect x="1058" y="108" width="166" height="140" rx="22" fill="url(#fileFill)" stroke="#199A72" stroke-width="2"/>
  <text x="1141" y="152" text-anchor="middle" class="label">Original file</text>
  <text x="1141" y="179" text-anchor="middle" class="body">or matched chunk</text>
  <text x="1141" y="206" text-anchor="middle" class="body">full fidelity</text>

  <path d="M230 178H255" stroke="#38506B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M343 178H382" stroke="#38506B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M572 178H610" stroke="#38506B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M780 178H818" stroke="#38506B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1004 178H1042" stroke="#38506B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>